apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/name: vault-restart
  name: vault-restart-vaultrestart-viewer-role
rules:
- apiGroups:
  - vault.appsre.redhat.com
  resources:
  - vaultrestarts
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - vault.appsre.redhat.com
  resources:
  - vaultrestarts/status
  verbs:
  - get
