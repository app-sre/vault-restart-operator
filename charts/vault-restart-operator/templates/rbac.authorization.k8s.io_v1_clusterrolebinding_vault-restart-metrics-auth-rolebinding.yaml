  name: vault-restart-metrics-auth-rolebinding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: vault-restart-metrics-auth-role
subjects:
- kind: ServiceAccount
  name: vault-restart-controller-manager
  namespace: {{ .Release.Namespace }}
