apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  labels:
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/name: vault-restart
  name: vault-restart-leader-election-rolebinding
  namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: vault-restart-leader-election-role
subjects:
- kind: ServiceAccount
  name: vault-restart-controller-manager
  namespace: {{ .Release.Namespace }}
